<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GHS Logo FX - 元素動畫選擇器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  background: radial-gradient(ellipse at center, #1a0800 0%, #0d0200 50%, #050000 100%);
  font-family: -apple-system, 'Noto Sans TC', sans-serif;
  color: #fff;
  overflow-x: hidden;
}

/* ========== 控制面板 ========== */
.panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 300px;
  height: 100vh;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  border-left: 1px solid rgba(255,215,0,0.15);
  padding: 24px 18px;
  z-index: 100;
  overflow-y: auto;
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
}

.panel.collapsed { transform: translateX(100%); }

.panel-toggle {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 101;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(255,215,0,0.15);
  border: 1px solid rgba(255,215,0,0.4);
  color: #FFD700;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}
.panel-toggle:hover { background: rgba(255,215,0,0.3); }

.panel h2 {
  font-size: 16px;
  color: #FFD700;
  margin-bottom: 16px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(255,215,0,0.2);
}

.section {
  margin-bottom: 20px;
}

.section h3 {
  font-size: 13px;
  color: rgba(255,215,0,0.7);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.fx-btn {
  display: block;
  width: 100%;
  padding: 10px 14px;
  margin-bottom: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  color: #ccc;
  font-size: 14px;
  cursor: pointer;
  text-align: left;
  transition: all 0.2s;
  position: relative;
}

.fx-btn:hover {
  background: rgba(255,215,0,0.08);
  border-color: rgba(255,215,0,0.3);
  color: #fff;
}

.fx-btn.active {
  background: rgba(255,215,0,0.15);
  border-color: #FFD700;
  color: #FFD700;
  box-shadow: 0 0 12px rgba(255,215,0,0.1);
}

.fx-btn .tag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  background: rgba(255,107,53,0.3);
  color: #FF6B35;
  float: right;
  margin-top: 2px;
}

.fx-btn.active .tag {
  background: rgba(255,215,0,0.3);
  color: #FFD700;
}

/* 全選按鈕 */
.select-all {
  display: inline-block;
  padding: 4px 10px;
  font-size: 11px;
  color: rgba(255,215,0,0.6);
  background: transparent;
  border: 1px solid rgba(255,215,0,0.2);
  border-radius: 4px;
  cursor: pointer;
  float: right;
  margin-top: -2px;
}
.select-all:hover { border-color: rgba(255,215,0,0.5); color: #FFD700; }

/* 背景切換 */
.bg-switch {
  display: flex;
  gap: 6px;
  margin-top: 12px;
}

.bg-switch button {
  flex: 1;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.04);
  color: #aaa;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}

.bg-switch button.active {
  border-color: #FFD700;
  color: #FFD700;
  background: rgba(255,215,0,0.1);
}

/* ========== 舞台區域 ========== */
.stage {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding-right: 300px;
  transition: padding-right 0.4s;
}

.stage.full { padding-right: 0; }

.scene {
  position: relative;
  width: 600px;
  height: 600px;
}

/* ========== Logo 主體 ========== */
.logo-main {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

.logo-main img {
  width: 460px;
  height: 460px;
  object-fit: contain;
}

/* ========== FX 層 ========== */

/* --- FX1: 金色呼吸光暈 --- */
.fx-breathe-glow {
  animation: breatheGlow 2.5s ease-in-out infinite;
}

@keyframes breatheGlow {
  0%, 100% {
    filter: drop-shadow(0 0 6px rgba(255,200,0,0.4)) drop-shadow(0 0 12px rgba(255,107,53,0.2));
  }
  50% {
    filter: drop-shadow(0 0 20px rgba(255,215,0,0.9)) drop-shadow(0 0 45px rgba(255,180,0,0.6)) drop-shadow(0 0 80px rgba(255,107,53,0.35));
  }
}

/* --- FX2: 微幅浮動 --- */
.fx-float {
  animation: floatY 3s ease-in-out infinite;
}

@keyframes floatY {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

/* --- FX3: 脈衝縮放 --- */
.fx-pulse {
  animation: pulseScale 1.8s ease-in-out infinite;
}

@keyframes pulseScale {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* --- FX4: 搖晃 --- */
.fx-wobble {
  animation: wobble 2.5s ease-in-out infinite;
  transform-origin: center bottom;
}

@keyframes wobble {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-2deg); }
  75% { transform: rotate(2deg); }
}

/* --- FX5: 閃爍星星 (容器) --- */
.sparkles-layer {
  position: absolute;
  inset: 0;
  z-index: 20;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
}
.sparkles-layer.on { opacity: 1; }

.sparkle {
  position: absolute;
  pointer-events: none;
}
.sparkle::before, .sparkle::after {
  content: '';
  position: absolute;
  background: linear-gradient(135deg, #FFD700, #FFFACD, #FFD700);
  border-radius: 1px;
}
.sparkle::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
.sparkle::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }

@keyframes sparkleAnim {
  0%, 100% { opacity: 0; transform: scale(0) rotate(0deg); }
  15% { opacity: 1; transform: scale(1.3) rotate(45deg); }
  50% { opacity: 0.9; transform: scale(0.9) rotate(180deg); }
  100% { opacity: 0; transform: scale(0) rotate(360deg); }
}

/* --- FX6: 上飄金粒子 --- */
.particles-layer {
  position: absolute;
  inset: 0;
  z-index: 15;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
  overflow: hidden;
}
.particles-layer.on { opacity: 1; }

/* --- FX7: 旋轉光線 --- */
.rays-layer {
  position: absolute;
  inset: 0;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}
.rays-layer.on { opacity: 1; }

.rays-svg {
  width: 100%;
  height: 100%;
  animation: rotateRays 20s linear infinite;
}

@keyframes rotateRays {
  to { transform: rotate(360deg); }
}

/* --- FX8: 呼吸光環 --- */
.rings-layer {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
}
.rings-layer.on { opacity: 1; }

.glow-ring {
  position: absolute;
  top: 50%; left: 50%;
  border-radius: 50%;
  border: 2px solid rgba(255,215,0,0.1);
  transform: translate(-50%, -50%);
  animation: ringPulse 3s ease-in-out infinite;
}

@keyframes ringPulse {
  0%, 100% {
    transform: translate(-50%, -50%) scale(0.95);
    border-color: rgba(255,215,0,0.05);
    box-shadow: 0 0 5px rgba(255,215,0,0.02);
  }
  50% {
    transform: translate(-50%, -50%) scale(1.1);
    border-color: rgba(255,215,0,0.35);
    box-shadow: 0 0 30px rgba(255,215,0,0.12), inset 0 0 30px rgba(255,215,0,0.04);
  }
}

/* --- FX9: 爆發閃光 --- */
.flash-layer {
  position: absolute;
  inset: 0;
  z-index: 25;
  pointer-events: none;
}

/* --- FX10: 3D 透視旋轉 --- */
.fx-3d-tilt {
  animation: tilt3d 4s ease-in-out infinite;
  perspective: 800px;
}

@keyframes tilt3d {
  0%, 100% { transform: perspective(800px) rotateY(0deg) rotateX(0deg); }
  25% { transform: perspective(800px) rotateY(5deg) rotateX(-3deg); }
  50% { transform: perspective(800px) rotateY(0deg) rotateX(0deg); }
  75% { transform: perspective(800px) rotateY(-5deg) rotateX(3deg); }
}

/* --- FX11: 金色掃光 --- */
.fx-sweep::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg,
    transparent 30%,
    rgba(255,215,0,0.15) 45%,
    rgba(255,255,255,0.25) 50%,
    rgba(255,215,0,0.15) 55%,
    transparent 70%
  );
  animation: sweep 3s ease-in-out infinite;
  z-index: 11;
  pointer-events: none;
  border-radius: 50%;
}

@keyframes sweep {
  0% { transform: translateX(-150%); }
  100% { transform: translateX(150%); }
}

/* --- FX12: 邊緣火焰 --- */
.flame-layer {
  position: absolute;
  inset: 0;
  z-index: 8;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
}
.flame-layer.on { opacity: 1; }

/* --- FX13: 霓虹描邊 --- */
.neon-layer {
  position: absolute;
  inset: 0;
  z-index: 6;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
}
.neon-layer.on { opacity: 1; }

.neon-circle {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  animation: neonFlicker 2s ease-in-out infinite alternate;
}

@keyframes neonFlicker {
  0% {
    box-shadow: 0 0 5px #FF6B35, 0 0 15px #FF6B35, 0 0 30px #FF6B35, 0 0 60px #FF6B35;
    border-color: #FF6B35;
  }
  50% {
    box-shadow: 0 0 3px #00D4AA, 0 0 10px #00D4AA, 0 0 25px #00D4AA, 0 0 50px #00D4AA;
    border-color: #00D4AA;
  }
  100% {
    box-shadow: 0 0 8px #FFD700, 0 0 20px #FFD700, 0 0 40px #FFD700, 0 0 80px #FFD700;
    border-color: #FFD700;
  }
}

/* ========== 背景主題 ========== */
body.light {
  background: radial-gradient(ellipse at center, #fffaf0 0%, #fff 50%, #fefefe 100%);
}

body.gradient {
  background: radial-gradient(ellipse at 30% 30%, #1a0820 0%, #0a0018 40%, #050008 100%);
}

/* 拖曳覆蓋 */
#dropOverlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(255,215,0,0.06);
  border: 3px dashed rgba(255,215,0,0.5);
  z-index: 200;
  justify-content: center;
  align-items: center;
  font-size: 22px;
  color: #FFD700;
}

.hint {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,215,0,0.3);
  font-size: 12px;
  z-index: 10;
}

@media (max-width: 768px) {
  .stage { padding-right: 0; }
  .panel { width: 260px; }
  .scene { width: 360px; height: 360px; }
  .logo-main img { width: 300px; height: 300px; }
}
</style>
</head>
<body>

<button class="panel-toggle" onclick="togglePanel()">FX</button>

<div class="panel" id="panel">
  <h2>GHS Logo 動畫選擇器</h2>

  <!-- Logo 動態 -->
  <div class="section">
    <h3>Logo 動態 <button class="select-all" onclick="toggleGroup('logo')">全選</button></h3>
    <button class="fx-btn" data-fx="breathe-glow" data-group="logo" onclick="toggleFX(this)">
      金色呼吸光暈 <span class="tag">推薦</span>
    </button>
    <button class="fx-btn" data-fx="float" data-group="logo" onclick="toggleFX(this)">
      微幅浮動
    </button>
    <button class="fx-btn" data-fx="pulse" data-group="logo" onclick="toggleFX(this)">
      脈衝縮放
    </button>
    <button class="fx-btn" data-fx="wobble" data-group="logo" onclick="toggleFX(this)">
      左右搖晃
    </button>
    <button class="fx-btn" data-fx="3d-tilt" data-group="logo" onclick="toggleFX(this)">
      3D 透視旋轉 <span class="tag">炫</span>
    </button>
    <button class="fx-btn" data-fx="sweep" data-group="logo" onclick="toggleFX(this)">
      金色掃光 <span class="tag">炫</span>
    </button>
  </div>

  <!-- 環境特效 -->
  <div class="section">
    <h3>環境特效 <button class="select-all" onclick="toggleGroup('env')">全選</button></h3>
    <button class="fx-btn" data-fx="sparkles" data-group="env" onclick="toggleFX(this)">
      閃爍星星
    </button>
    <button class="fx-btn" data-fx="particles" data-group="env" onclick="toggleFX(this)">
      上飄金粒子
    </button>
    <button class="fx-btn" data-fx="rays" data-group="env" onclick="toggleFX(this)">
      旋轉光線
    </button>
    <button class="fx-btn" data-fx="rings" data-group="env" onclick="toggleFX(this)">
      呼吸光環
    </button>
    <button class="fx-btn" data-fx="flash" data-group="env" onclick="toggleFX(this)">
      隨機爆發閃光 <span class="tag">炫</span>
    </button>
    <button class="fx-btn" data-fx="flame" data-group="env" onclick="toggleFX(this)">
      底部火焰
    </button>
    <button class="fx-btn" data-fx="neon" data-group="env" onclick="toggleFX(this)">
      霓虹描邊 <span class="tag">GHS 色</span>
    </button>
  </div>

  <!-- 背景 -->
  <div class="section">
    <h3>背景</h3>
    <div class="bg-switch">
      <button class="active" onclick="setBg('dark', this)">深色</button>
      <button onclick="setBg('light', this)">白底</button>
      <button onclick="setBg('gradient', this)">紫夜</button>
    </div>
  </div>

  <!-- 預設組合 -->
  <div class="section">
    <h3>一鍵預設</h3>
    <button class="fx-btn" onclick="applyPreset('chill')">低調質感</button>
    <button class="fx-btn" onclick="applyPreset('flashy')">全開炸裂 <span class="tag">最炫</span></button>
    <button class="fx-btn" onclick="applyPreset('elegant')">優雅金光</button>
    <button class="fx-btn" onclick="applyPreset('none')">全部關閉</button>
  </div>

  <!-- 下載 -->
  <div class="section">
    <h3>下載</h3>
    <button class="fx-btn" onclick="downloadPNG()">
      下載 PNG 截圖 <span class="tag">靜態</span>
    </button>
    <button class="fx-btn" id="recBtn" onclick="toggleRecord()">
      錄製動畫 WebM <span class="tag">動態</span>
    </button>
    <div id="recStatus" style="font-size:12px;color:#FF6B35;margin-top:6px;display:none;"></div>
  </div>
</div>

<!-- 舞台 -->
<div class="stage" id="stage">
  <div class="scene" id="scene">

    <!-- 霓虹層 -->
    <div class="neon-layer" id="layer-neon">
      <div class="neon-circle" style="width:440px;height:440px;border:2px solid #FF6B35;animation-delay:0s;"></div>
      <div class="neon-circle" style="width:480px;height:480px;border:1.5px solid #00D4AA;animation-delay:-0.7s;"></div>
    </div>

    <!-- 火焰層 -->
    <div class="flame-layer" id="layer-flame">
      <svg width="100%" height="100%" viewBox="0 0 600 600">
        <defs>
          <filter id="flameBlur"><feGaussianBlur stdDeviation="6"/></filter>
          <linearGradient id="flameGrad" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.8"/>
            <stop offset="50%" stop-color="#FFD700" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <g filter="url(#flameBlur)" opacity="0.6">
          <ellipse cx="200" cy="520" rx="30" ry="60" fill="url(#flameGrad)">
            <animate attributeName="ry" values="55;75;50;70;55" dur="1.2s" repeatCount="indefinite"/>
            <animate attributeName="rx" values="28;35;25;33;28" dur="1.4s" repeatCount="indefinite"/>
          </ellipse>
          <ellipse cx="260" cy="510" rx="25" ry="70" fill="url(#flameGrad)">
            <animate attributeName="ry" values="65;80;60;78;65" dur="1.0s" repeatCount="indefinite"/>
            <animate attributeName="rx" values="22;30;20;28;22" dur="1.3s" repeatCount="indefinite"/>
          </ellipse>
          <ellipse cx="320" cy="505" rx="28" ry="80" fill="url(#flameGrad)">
            <animate attributeName="ry" values="75;95;70;90;75" dur="0.9s" repeatCount="indefinite"/>
            <animate attributeName="rx" values="25;33;22;30;25" dur="1.1s" repeatCount="indefinite"/>
          </ellipse>
          <ellipse cx="380" cy="510" rx="25" ry="65" fill="url(#flameGrad)">
            <animate attributeName="ry" values="60;78;55;72;60" dur="1.1s" repeatCount="indefinite"/>
            <animate attributeName="rx" values="22;30;20;28;22" dur="1.5s" repeatCount="indefinite"/>
          </ellipse>
          <ellipse cx="430" cy="520" rx="28" ry="55" fill="url(#flameGrad)">
            <animate attributeName="ry" values="50;68;48;65;50" dur="1.3s" repeatCount="indefinite"/>
          </ellipse>
        </g>
      </svg>
    </div>

    <!-- 光環層 -->
    <div class="rings-layer" id="layer-rings">
      <div class="glow-ring" style="width:420px;height:420px;animation-delay:0s;"></div>
      <div class="glow-ring" style="width:480px;height:480px;animation-delay:-1s;"></div>
      <div class="glow-ring" style="width:540px;height:540px;animation-delay:-2s;"></div>
    </div>

    <!-- 旋轉光線層 -->
    <div class="rays-layer" id="layer-rays">
      <svg class="rays-svg" viewBox="0 0 600 600">
        <defs>
          <linearGradient id="rayG" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#FFD700" stop-opacity="0"/>
            <stop offset="50%" stop-color="#FFD700" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <g transform="translate(300,300)">
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(0)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(22.5)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(45)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(67.5)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(90)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(112.5)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(135)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(157.5)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(180)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(202.5)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(225)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(247.5)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(270)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(292.5)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(315)"/>
          <line x1="0" y1="0" x2="290" y2="0" stroke="url(#rayG)" stroke-width="2" transform="rotate(337.5)"/>
        </g>
      </svg>
    </div>

    <!-- 粒子層 -->
    <div class="particles-layer" id="layer-particles"></div>

    <!-- 星星層 -->
    <div class="sparkles-layer" id="layer-sparkles"></div>

    <!-- 爆發閃光層 -->
    <div class="flash-layer" id="layer-flash"></div>

    <!-- Logo -->
    <div class="logo-main" id="logoWrap">
      <img id="logoImg" src="ghs-logo.png" alt="GHS"
           onerror="this.onerror=null; document.getElementById('hint').textContent='找不到 ghs-logo.png，把圖片拖進來';">
    </div>
  </div>
</div>

<div class="hint" id="hint">拖曳圖片可更換 Logo</div>

<div id="dropOverlay">放開圖片</div>

<script>
// ========== 狀態管理 ==========
const state = {
  fx: new Set(),
};

const logoWrap = document.getElementById('logoWrap');
const logoImg = document.getElementById('logoImg');

// ========== FX 切換邏輯 ==========
function toggleFX(btn) {
  const fx = btn.dataset.fx;
  btn.classList.toggle('active');

  if (btn.classList.contains('active')) {
    state.fx.add(fx);
  } else {
    state.fx.delete(fx);
  }
  applyFX();
}

function toggleGroup(group) {
  const btns = document.querySelectorAll(`.fx-btn[data-group="${group}"]`);
  const allActive = [...btns].every(b => b.classList.contains('active'));

  btns.forEach(b => {
    if (allActive) {
      b.classList.remove('active');
      state.fx.delete(b.dataset.fx);
    } else {
      b.classList.add('active');
      state.fx.add(b.dataset.fx);
    }
  });
  applyFX();
}

function applyFX() {
  const has = (fx) => state.fx.has(fx);

  // Logo 動態 class
  const classes = [];
  if (has('breathe-glow')) classes.push('fx-breathe-glow');
  if (has('float')) classes.push('fx-float');
  if (has('pulse')) classes.push('fx-pulse');
  if (has('wobble')) classes.push('fx-wobble');
  if (has('3d-tilt')) classes.push('fx-3d-tilt');
  if (has('sweep')) classes.push('fx-sweep');

  logoWrap.className = 'logo-main ' + classes.join(' ');

  // 環境層 開關
  toggle('layer-sparkles', has('sparkles'));
  toggle('layer-particles', has('particles'));
  toggle('layer-rays', has('rays'));
  toggle('layer-rings', has('rings'));
  toggle('layer-flame', has('flame'));
  toggle('layer-neon', has('neon'));

  // 爆發閃光
  if (has('flash') && !window._flashInterval) {
    window._flashInterval = setInterval(() => {
      if (Math.random() > 0.25) spawnFlash();
    }, 500);
  } else if (!has('flash') && window._flashInterval) {
    clearInterval(window._flashInterval);
    window._flashInterval = null;
  }
}

function toggle(id, on) {
  document.getElementById(id).classList.toggle('on', on);
}

// ========== 預設組合 ==========
function applyPreset(name) {
  // 先全部關閉
  document.querySelectorAll('.fx-btn[data-fx]').forEach(b => {
    b.classList.remove('active');
  });
  state.fx.clear();

  const presets = {
    chill: ['breathe-glow', 'float', 'sparkles'],
    flashy: ['breathe-glow', 'float', 'pulse', '3d-tilt', 'sweep', 'sparkles', 'particles', 'rays', 'rings', 'flash', 'flame', 'neon'],
    elegant: ['breathe-glow', 'float', 'sweep', 'rings', 'sparkles'],
    none: [],
  };

  (presets[name] || []).forEach(fx => {
    state.fx.add(fx);
    const btn = document.querySelector(`.fx-btn[data-fx="${fx}"]`);
    if (btn) btn.classList.add('active');
  });

  applyFX();
}

// ========== 生成閃爍星星 ==========
(function initSparkles() {
  const layer = document.getElementById('layer-sparkles');
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    const size = Math.random() * 16 + 5;
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * 240 + 50;
    const cx = 300 + Math.cos(angle) * dist;
    const cy = 300 + Math.sin(angle) * dist;
    const dur = Math.random() * 2 + 1;
    const delay = Math.random() * 4;
    el.style.cssText = `width:${size}px;height:${size}px;left:${cx-size/2}px;top:${cy-size/2}px;animation:sparkleAnim ${dur}s ${delay}s ease-in-out infinite;`;
    layer.appendChild(el);
  }
})();

// ========== 生成上飄粒子 ==========
(function initParticles() {
  const layer = document.getElementById('layer-particles');
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    const size = Math.random() * 4 + 1;
    const x = Math.random() * 500 + 50;
    const dur = Math.random() * 5 + 3;
    const delay = Math.random() * dur;
    const drift = (Math.random() - 0.5) * 80;
    const id = `pf${Math.round(drift)}`;

    if (!document.getElementById(id)) {
      const s = document.createElement('style');
      s.id = id;
      s.textContent = `@keyframes ${id}{0%{transform:translateY(0)translateX(0);opacity:0}5%{opacity:0.9}80%{opacity:0.5}100%{transform:translateY(-620px)translateX(${drift}px);opacity:0}}`;
      document.head.appendChild(s);
    }

    el.style.cssText = `position:absolute;width:${size}px;height:${size}px;background:radial-gradient(circle,#FFD700,rgba(255,165,0,0.3)60%,transparent);border-radius:50%;left:${x}px;bottom:0;animation:${id} ${dur}s ${delay}s linear infinite;`;
    layer.appendChild(el);
  }
})();

// ========== 爆發閃光 ==========
function spawnFlash() {
  const layer = document.getElementById('layer-flash');
  const el = document.createElement('div');
  const size = Math.random() * 25 + 12;
  const angle = Math.random() * Math.PI * 2;
  const dist = Math.random() * 200 + 60;
  const cx = 300 + Math.cos(angle) * dist;
  const cy = 300 + Math.sin(angle) * dist;

  el.style.cssText = `position:absolute;width:${size}px;height:${size}px;left:${cx}px;top:${cy}px;pointer-events:none;`;

  const colors = ['#FFD700', '#FF6B35', '#00D4AA', '#FFFACD'];
  const color = colors[Math.floor(Math.random() * colors.length)];

  el.innerHTML = `<svg viewBox="0 0 20 20" width="${size}" height="${size}"><polygon points="10,0 12,7 20,7 14,12 16,20 10,15 4,20 6,12 0,7 8,7" fill="${color}" opacity="0.9"/></svg>`;

  layer.appendChild(el);
  el.animate([
    { opacity: 0, transform: 'scale(0) rotate(0deg)' },
    { opacity: 1, transform: 'scale(1.4) rotate(30deg)', offset: 0.3 },
    { opacity: 0.7, transform: 'scale(1) rotate(60deg)', offset: 0.6 },
    { opacity: 0, transform: 'scale(0.2) rotate(90deg)' }
  ], { duration: 1000 + Math.random() * 600, easing: 'ease-out' }).onfinish = () => el.remove();
}

// ========== 背景切換 ==========
function setBg(mode, btn) {
  document.body.className = mode === 'dark' ? '' : mode;
  document.querySelectorAll('.bg-switch button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ========== 面板收合 ==========
function togglePanel() {
  const p = document.getElementById('panel');
  const s = document.getElementById('stage');
  p.classList.toggle('collapsed');
  s.classList.toggle('full');
}

// ========== 拖曳換圖 ==========
const dropOverlay = document.getElementById('dropOverlay');
document.addEventListener('dragover', e => { e.preventDefault(); dropOverlay.style.display = 'flex'; });
document.addEventListener('dragleave', e => { if (!e.relatedTarget) dropOverlay.style.display = 'none'; });
document.addEventListener('drop', e => {
  e.preventDefault();
  dropOverlay.style.display = 'none';
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) {
    const r = new FileReader();
    r.onload = ev => { logoImg.src = ev.target.result; document.getElementById('hint').textContent = ''; };
    r.readAsDataURL(f);
  }
});

// ========== 下載 PNG ==========
function downloadPNG() {
  const scene = document.getElementById('scene');
  const rect = scene.getBoundingClientRect();
  const scale = 2; // 2x 高清

  const canvas = document.createElement('canvas');
  canvas.width = rect.width * scale;
  canvas.height = rect.height * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  // 畫背景
  const bodyStyle = getComputedStyle(document.body);
  const bg = bodyStyle.backgroundImage;
  if (document.body.classList.contains('light')) {
    ctx.fillStyle = '#fffaf0';
  } else if (document.body.classList.contains('gradient')) {
    ctx.fillStyle = '#0a0018';
  } else {
    ctx.fillStyle = '#0d0200';
  }
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 用 html2canvas 的替代方案：直接用 foreignObject 轉 SVG 再畫到 canvas
  // 簡單方案：直接截取 logo 圖片本身 + 背景
  const img = document.getElementById('logoImg');
  const imgW = 460, imgH = 460;
  const ox = (rect.width - imgW) / 2;
  const oy = (rect.height - imgH) / 2;

  // 畫光暈效果
  const gradient = ctx.createRadialGradient(rect.width/2, rect.height/2, 0, rect.width/2, rect.height/2, 250);
  gradient.addColorStop(0, 'rgba(255, 200, 0, 0.2)');
  gradient.addColorStop(0.5, 'rgba(255, 107, 53, 0.1)');
  gradient.addColorStop(1, 'transparent');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, rect.width, rect.height);

  // 畫 logo
  try {
    ctx.drawImage(img, ox, oy, imgW, imgH);
  } catch(e) {}

  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ghs-logo-fx.png';
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

// ========== 錄製動畫 WebM ==========
let mediaRecorder = null;
let recordedChunks = [];

function toggleRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    stopRecord();
  } else {
    startRecord();
  }
}

function startRecord() {
  const scene = document.getElementById('scene');
  const recBtn = document.getElementById('recBtn');
  const recStatus = document.getElementById('recStatus');

  // 用 canvas 錄影
  const rect = scene.getBoundingClientRect();
  const canvas = document.createElement('canvas');
  canvas.width = 600;
  canvas.height = 600;
  canvas.style.cssText = 'position:fixed;top:-9999px;';
  document.body.appendChild(canvas);

  const stream = canvas.captureStream(30);
  mediaRecorder = new MediaRecorder(stream, {
    mimeType: 'video/webm;codecs=vp9',
    videoBitsPerSecond: 5000000
  });

  recordedChunks = [];
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    canvas.remove();
    cancelAnimationFrame(window._recRAF);

    const blob = new Blob(recordedChunks, { type: 'video/webm' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ghs-logo-fx.webm';
    a.click();
    URL.revokeObjectURL(url);

    recBtn.innerHTML = '錄製動畫 WebM <span class="tag">動態</span>';
    recBtn.classList.remove('active');
    recStatus.style.display = 'none';
  };

  mediaRecorder.start();
  recBtn.innerHTML = '停止錄製 <span class="tag" style="background:rgba(255,50,50,0.4);color:#ff6b6b;">REC</span>';
  recBtn.classList.add('active');
  recStatus.textContent = '錄製中... 選好特效後按「停止錄製」';
  recStatus.style.display = 'block';

  // 持續把 scene 畫到 canvas
  const ctx = canvas.getContext('2d');

  function drawFrame() {
    // 背景
    if (document.body.classList.contains('light')) {
      ctx.fillStyle = '#fffaf0';
    } else if (document.body.classList.contains('gradient')) {
      ctx.fillStyle = '#0a0018';
    } else {
      ctx.fillStyle = '#0d0200';
    }
    ctx.fillRect(0, 0, 600, 600);

    // 光暈
    const g = ctx.createRadialGradient(300, 300, 0, 300, 300, 250);
    g.addColorStop(0, 'rgba(255,200,0,0.15)');
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 600, 600);

    // Logo
    const img = document.getElementById('logoImg');
    try { ctx.drawImage(img, 70, 70, 460, 460); } catch(e) {}

    window._recRAF = requestAnimationFrame(drawFrame);
  }
  drawFrame();
}

function stopRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

// ========== 預設開「優雅金光」 ==========
applyPreset('elegant');
</script>
